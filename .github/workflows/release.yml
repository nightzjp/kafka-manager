name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    env:
      ARCHIVE_NAME: kafka-manager-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Build frontend
        run: |
          pnpm --dir web install --frozen-lockfile
          pnpm --dir web build
          mkdir -p internal/webassets/dist-built
          cp -R web/dist/. internal/webassets/dist-built/
      - name: Build and package binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "dist/${ARCHIVE_NAME}"
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "dist/${ARCHIVE_NAME}/kafka-manager" .
          cp config.example.yaml README.md LICENSE "dist/${ARCHIVE_NAME}/"
          tar -C dist -czf "dist/${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: dist/${{ env.ARCHIVE_NAME }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: kafka-manager-*
          path: dist
          merge-multiple: true
      - name: Create checksums
        run: sha256sum dist/*.tar.gz > dist/SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.gz \
            dist/SHA256SUMS \
            --verify-tag \
            --generate-notes \
            --title "Kafka Manager $GITHUB_REF_NAME"
