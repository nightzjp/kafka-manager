# Kafka Manager 配置文件
# 复制为 config.yaml 后修改；config.yaml 包含凭据，必须设置 0600 权限且不要提交到 Git。

# Web 服务与登录配置
# listenAddress 支持 ":8080"（所有网卡）或 "127.0.0.1:8080"（仅本机）。
server:
  listenAddress: ":8080"
  username: admin
  password: "change-this-login-password"
  sessionHours: 12

# Kafka 集群列表，可继续追加；readOnly 为 true 时禁止所有 Kafka 写操作。
# protocol: PLAINTEXT / SSL / SASL_PLAINTEXT / SASL_SSL
# SASL mechanism: PLAIN / SCRAM-SHA-256 / SCRAM-SHA-512
clusters:
  - id: test
    name: 测试环境
    readOnly: false
    brokers:
      - kafka-test.example.local:9092
    security:
      protocol: SASL_PLAINTEXT
      mechanism: PLAIN
      username: "your-kafka-username"
      password: "your-kafka-password"

  - id: internal
    name: 内网环境
    readOnly: true
    brokers:
      - kafka-internal.example.local:9092
    security:
      protocol: PLAINTEXT

# 审计日志按日期和大小轮转；配置备份按 configBackupRetentionDays 清理。
audit:
  enabled: true
  directory: ./data/audit
  retentionDays: 30
  maxFileSizeMB: 50
  configBackupRetentionDays: 30

# 首页监控采样间隔（秒）和内存中保留的历史点数。
dashboard:
  sampleIntervalSeconds: 15
  historyPoints: 240
