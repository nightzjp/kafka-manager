server:
  listenAddress: ":8080"
  username: admin
  passwordHash: "replace-with-argon2id-hash"
  sessionHours: 12

clusters:
  - id: test
    name: 测试环境
    brokers:
      - kafka-test.example.local:9092
    security:
      protocol: SASL_PLAINTEXT
      mechanism: PLAIN
      username: "your-kafka-username"
      password: "your-kafka-password"

  - id: internal
    name: 内网环境
    brokers:
      - kafka-internal.example.local:9092
    security:
      protocol: PLAINTEXT

audit:
  enabled: true
  directory: ./data/audit
  retentionDays: 30
  maxFileSizeMB: 50

dashboard:
  sampleIntervalSeconds: 15
  historyPoints: 240
